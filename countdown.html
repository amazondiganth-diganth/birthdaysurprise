<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown</title>

<style>
  body {
    margin: 0;
    font-family: Georgia, serif;
    color: white;
    overflow: hidden;
  }

  /* 🌄 Background */
  body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: url("https://i.postimg.cc/DZJLy97H/IMG-20240420-012626.jpg") no-repeat center/cover;
    filter: brightness(0.9);
    z-index: -1;
  }

  .container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 100vh;
    padding: 20px;
  }

  /* 🕰️ Clock */
  .clock {
    width: 260px;
    height: 260px;
    border: 6px solid #8B0000;
    border-radius: 50%;
    position: relative;
    background: radial-gradient(circle, #222 60%, #000);
  }

  .number {
    position: absolute;
    color: #f5deb3;
    font-size: 18px;
    font-weight: bold;
    transform: translate(-50%, -50%);
  }

  .n12 { top: 10%; left: 50%; }
  .n3  { top: 50%; left: 90%; }
  .n6  { top: 90%; left: 50%; }
  .n9  { top: 50%; left: 10%; }
  .n1 { top: 20%; left: 75%; }
  .n2 { top: 35%; left: 88%; }
  .n4 { top: 70%; left: 88%; }
  .n5 { top: 85%; left: 75%; }
  .n7 { top: 85%; left: 25%; }
  .n8 { top: 70%; left: 12%; }
  .n10 { top: 35%; left: 12%; }
  .n11 { top: 20%; left: 25%; }

  .hand {
    position: absolute;
    top: 50%;
    left: 50%;
    transform-origin: left;
    background: #f5deb3;
  }

  .hour { width: 35%; height: 4px; }
  .minute { width: 45%; height: 3px; }
  .second { width: 48%; height: 2px; background: red; }

  .center {
    width: 10px;
    height: 10px;
    background: #f5deb3;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  /* ⏳ Right */
  .right {
    text-align: center;
  }

  #countdown {
    font-size: 2rem;
    color: red;
    font-family: 'Courier New', monospace;
    animation: bounce 1s infinite;
  }

  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  /* 💬 Message */
  .message {
    margin-top: 20px;
    background: rgba(255,255,255,0.9);
    color: #333;
    padding: 15px;
    border-radius: 15px;
    max-width: 320px;
    font-family: Arial, sans-serif;
    cursor: pointer;
    line-height: 1.4;
  }

  .cta {
    font-weight: bold;
    font-size: 1.1rem;
  }

  .hidden {
    display: none;
  }

  @media (max-width: 768px) {
    .container {
      flex-direction: column;
      justify-content: center;
      gap: 30px;
    }
  }

</style>
</head>

<body>

<div class="container">

  <!-- 🕰️ Clock -->
  <div class="clock">
    <div class="number n12">12</div>
    <div class="number n1">1</div>
    <div class="number n2">2</div>
    <div class="number n3">3</div>
    <div class="number n4">4</div>
    <div class="number n5">5</div>
    <div class="number n6">6</div>
    <div class="number n7">7</div>
    <div class="number n8">8</div>
    <div class="number n9">9</div>
    <div class="number n10">10</div>
    <div class="number n11">11</div>

    <div class="hand hour" id="hour"></div>
    <div class="hand minute" id="minute"></div>
    <div class="hand second" id="second"></div>
    <div class="center"></div>
  </div>

  <!-- ⏳ Right -->
  <div class="right">

    <div id="countdown"></div>

    <!-- Interactive Message -->
    <div id="messageBox" class="message" onclick="handleClick()">
      <div id="text" class="cta">
        CLICK HERE FOR YOUR BIRTHDAY CELEBRATION
      </div>
    </div>

  </div>

</div>

<script>
const target = new Date("April 21, 2026 00:00:00").getTime();

let clickCount = 0;

const confusingMessages = [
  "Excuse Me. Gorgeous lady. Nice to Meet YOUUUUUUU",
  "Oops! Can you try again, coz my eyes were distracted by you ",
  "I am looking at an ANGLE>>>>",
  "You are looking beautiful... I forgot to check your response",
  "Stunning Beauty.Sorry, Click ASAP!"
];

function handleClick() {
  clickCount++;

  if (clickCount <= 5) {
    const randomMsg = confusingMessages[Math.floor(Math.random() * confusingMessages.length)];
    document.getElementById("text").innerText = randomMsg;
  }

  if (clickCount === 5) {
    setTimeout(() => {
      document.getElementById("text").innerText =
        "Have Patience Girl. It's Your Birthday Surprise 🎁";
    }, 800);
  }
}

function update() {
  const now = new Date();

  document.getElementById("second").style.transform =
    `rotate(${now.getSeconds()*6}deg)`;

  document.getElementById("minute").style.transform =
    `rotate(${now.getMinutes()*6}deg)`;

  document.getElementById("hour").style.transform =
    `rotate(${(now.getHours()%12)*30 + now.getMinutes()*0.5}deg)`;

  const diff = target - now.getTime();

  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff % (1000*60*60*24))/(1000*60*60));
  const m = Math.floor((diff % (1000*60*60))/(1000*60));
  const s = Math.floor((diff % (1000*60))/1000);

  if (diff > 0) {
    document.getElementById("countdown").innerHTML =
      `${d}d ${h}h ${m}m ${s}s`;
  } else {
    window.location.href = "birthday.html";
  }
}

setInterval(update, 1000);
</script>

</body>
</html>
